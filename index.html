<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Multi‑Segment Fare Builder · Thames Valley Buses</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', 'Inter', 'Roboto', sans-serif;
        }
        body {
            background: #eef2f5;
            margin: 0;
            padding: 2rem 1.5rem;
        }
        .app-container {
            max-width: 950px;
            margin: 0 auto;
        }
        .main-card {
            background: white;
            border-radius: 2rem;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.15);
            overflow: hidden;
        }
        .header {
            background: #003d5b;
            color: white;
            padding: 1.6rem 2rem;
        }
        .header h1 {
            margin: 0;
            font-size: 1.7rem;
            font-weight: 600;
        }
        .header p {
            margin: 0.4rem 0 0;
            opacity: 0.8;
            font-size: 0.9rem;
        }
        .segments-area {
            padding: 2rem 2rem 1rem 2rem;
        }
        .segment-card {
            background: #f9fbfd;
            border-radius: 1.5rem;
            border: 1px solid #e2edf2;
            padding: 1.3rem 1.5rem;
            margin-bottom: 1.8rem;
        }
        .segment-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            margin-bottom: 1rem;
            gap: 0.5rem;
        }
        .segment-title {
            font-weight: 700;
            color: #1f5e7a;
            background: #e9f0f5;
            padding: 0.2rem 1rem;
            border-radius: 2rem;
            font-size: 0.85rem;
        }
        .remove-seg {
            background: none;
            border: none;
            color: #9a6e6e;
            font-size: 1.3rem;
            cursor: pointer;
            font-weight: 600;
            padding: 0 0.5rem;
            border-radius: 2rem;
        }
        .remove-seg:hover {
            color: #c7362b;
            background: #fff0ee;
        }
        .form-row {
            display: flex;
            flex-wrap: wrap;
            gap: 1.2rem;
            margin-bottom: 1rem;
        }
        .field {
            flex: 1;
            min-width: 160px;
        }
        .field label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            color: #2c647e;
            margin-bottom: 0.3rem;
        }
        select {
            width: 100%;
            padding: 0.7rem 0.9rem;
            border-radius: 1rem;
            border: 1.5px solid #e0e9f0;
            background: white;
            font-size: 0.9rem;
            cursor: pointer;
        }
        select:focus {
            border-color: #2c7da0;
            box-shadow: 0 0 0 2px rgba(44,125,160,0.2);
        }
        select:disabled {
            background: #f0f4f8;
            cursor: not-allowed;
            opacity: 0.7;
        }
        .segment-fare {
            background: #eef3fa;
            border-radius: 1.2rem;
            padding: 0.5rem 1rem;
            margin-top: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
        }
        .fare-label {
            font-weight: 600;
            color: #1f5e7a;
        }
        .fare-amount {
            font-weight: 800;
            font-size: 1.3rem;
            color: #0f2c39;
        }
        .total-section {
            background: #eef2f8;
            margin: 0.5rem 2rem 2rem 2rem;
            border-radius: 1.8rem;
            padding: 1rem 1.8rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            border-top: 2px solid #cbdde6;
        }
        .total-label {
            font-weight: 700;
            font-size: 1.2rem;
            color: #1a4b63;
        }
        .total-value {
            font-size: 2rem;
            font-weight: 800;
            color: #003d5b;
        }
        .add-btn {
            background: #2c7da0;
            border: none;
            color: white;
            font-weight: 600;
            padding: 0.7rem 1.5rem;
            border-radius: 3rem;
            margin: 0 2rem 1.5rem 2rem;
            width: calc(100% - 4rem);
            cursor: pointer;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        .add-btn:hover {
            background: #1f5e7a;
            transform: scale(0.98);
        }
        .attribution {
            text-align: center;
            padding: 1.2rem;
            font-size: 0.7rem;
            color: #6c8ea0;
            border-top: 1px solid #e2edf2;
        }
        .error-message {
            background: #fee2e2;
            color: #b91c1c;
            padding: 0.6rem 1rem;
            border-radius: 1rem;
            font-size: 0.8rem;
            margin-top: 0.5rem;
        }
        .empty-message {
            text-align: center;
            padding: 2rem;
            color: #6c8ea0;
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="main-card">
        <div class="header">
            <h1>🧾 Multi‑leg fare builder</h1>
            <p>Add route segments · pick origin & destination · automatic total</p>
        </div>
        <div id="segmentsContainer" class="segments-area"></div>
        <div class="total-section">
            <span class="total-label">💰 TOTAL (all segments)</span>
            <span class="total-value" id="grandTotal">£0.00</span>
        </div>
        <button class="add-btn" id="addSegmentBtn">➕ Add another route segment</button>
        <div class="attribution">
            Data loaded from external files: route_metadata.json, stop lists (.txt), zone mappings and prices (.json).
        </div>
    </div>
</div>

<script>
    // --------------------------------------------------------------
    // Global data structures
    // --------------------------------------------------------------
    let ROUTE_METADATA = {};      // loaded from route_metadata.json
    const ROUTES_DATA = {};       // fully constructed route objects

    // Segment management
    let segmentCounter = 0;
    let segments = [];

    const segmentsContainer = document.getElementById('segmentsContainer');
    const grandTotalSpan = document.getElementById('grandTotal');

    // --------------------------------------------------------------
    // Helper: load text file (stops)
    // --------------------------------------------------------------
    async function loadStopsFromFile(filename) {
        const response = await fetch(filename);
        if (!response.ok) throw new Error(`HTTP ${response.status} loading ${filename}`);
        const text = await response.text();
        return text.split(/\r?\n/).map(l => l.trim()).filter(l => l !== "");
    }

    // --------------------------------------------------------------
    // Helper: load JSON file
    // --------------------------------------------------------------
    async function loadJSON(filename) {
        const response = await fetch(filename);
        if (!response.ok) throw new Error(`HTTP ${response.status} loading ${filename}`);
        return response.json();
    }

    // --------------------------------------------------------------
    // Load route metadata from external JSON
    // --------------------------------------------------------------
    async function loadRouteMetadata() {
        const response = await fetch("route_metadata.json");
        if (!response.ok) throw new Error("Failed to load route_metadata.json");
        ROUTE_METADATA = await response.json();
    }

    // --------------------------------------------------------------
    // For each route, load stops, zones, prices and build ROUTES_DATA
    // --------------------------------------------------------------
    async function loadAllRouteData() {
        const promises = [];
        for (const [routeId, meta] of Object.entries(ROUTE_METADATA)) {
            const promise = (async () => {
                try {
                    const [stops, zones, prices] = await Promise.all([
                        loadStopsFromFile(meta.stopsFile),
                        loadJSON(meta.zonesFile),
                        loadJSON(meta.pricesFile)
                    ]);
                    ROUTES_DATA[routeId] = {
                        id: routeId,
                        displayName: meta.displayName,
                        lineDescription: meta.lineDescription,
                        stops: stops,
                        stopOriginZone: zones.stopOriginZone,
                        stopDestZone: zones.stopDestZone,
                        prices: prices
                    };
                    console.log(`✅ Loaded ${routeId}`);
                } catch (err) {
                    console.error(`❌ Failed to load ${routeId}:`, err);
                    // Create an empty placeholder so UI doesn't break
                    ROUTES_DATA[routeId] = {
                        id: routeId,
                        displayName: meta.displayName,
                        lineDescription: meta.lineDescription,
                        stops: [],
                        stopOriginZone: {},
                        stopDestZone: {},
                        prices: {}
                    };
                }
            })();
            promises.push(promise);
        }
        await Promise.all(promises);
    }

    // --------------------------------------------------------------
    // Segment fare calculation
    // --------------------------------------------------------------
    function computeSegmentFare(segment) {
        if (!segment.routeKey || !segment.originId || !segment.destId) return null;
        const route = ROUTES_DATA[segment.routeKey];
        if (!route) return null;
        const originZone = route.stopOriginZone[segment.originId];
        const destZone = route.stopDestZone[segment.destId];
        if (!originZone || !destZone) return null;
        const priceKey = `${originZone}|${destZone}`;
        const price = route.prices[priceKey];
        return (price !== undefined) ? price : null;
    }

    function updateGrandTotal() {
        let total = 0;
        segments.forEach(seg => { if (seg.fare && !isNaN(seg.fare)) total += seg.fare; });
        grandTotalSpan.textContent = `£${total.toFixed(2)}`;
    }

    function refreshSegmentUI(segmentId) {
        const segElement = document.getElementById(`segment-${segmentId}`);
        if (!segElement) return;
        const segment = segments.find(s => s.id === segmentId);
        if (!segment) return;
        const fareSpan = segElement.querySelector('.segment-fare-amount');
        const route = ROUTES_DATA[segment.routeKey];
        if (segment.originId && segment.destId && route) {
            const fare = computeSegmentFare(segment);
            segment.fare = fare;
            if (fare !== null && fare !== undefined) {
                fareSpan.textContent = `£${fare.toFixed(2)}`;
            } else {
                fareSpan.textContent = '❌ no fare (invalid pair)';
                segment.fare = 0;
            }
        } else {
            fareSpan.textContent = '—';
            segment.fare = 0;
        }
        updateGrandTotal();
    }

    function populateStopDropdowns(segmentId, routeKey) {
        const segment = segments.find(s => s.id === segmentId);
        if (!segment) return;
        const route = ROUTES_DATA[routeKey];
        const originSelect = document.getElementById(`origin-${segmentId}`);
        const destSelect = document.getElementById(`dest-${segmentId}`);
        if (!originSelect || !destSelect) return;

        originSelect.innerHTML = '';
        destSelect.innerHTML = '';

        if (!route.stops || route.stops.length === 0) {
            const errOpt = document.createElement('option');
            errOpt.disabled = true;
            errOpt.selected = true;
            errOpt.textContent = `⚠️ Stops not loaded (missing ${routeKey} files)`;
            originSelect.appendChild(errOpt.cloneNode(true));
            destSelect.appendChild(errOpt.cloneNode(true));
            originSelect.disabled = true;
            destSelect.disabled = true;
            segment.originId = null;
            segment.destId = null;
            refreshSegmentUI(segmentId);
            return;
        }

        originSelect.disabled = false;
        destSelect.disabled = false;

        const defaultOrig = document.createElement('option');
        defaultOrig.value = "";
        defaultOrig.disabled = true;
        defaultOrig.selected = true;
        defaultOrig.textContent = "— Origin stop —";
        originSelect.appendChild(defaultOrig);

        const defaultDest = document.createElement('option');
        defaultDest.value = "";
        defaultDest.disabled = true;
        defaultDest.selected = true;
        defaultDest.textContent = "— Destination stop —";
        destSelect.appendChild(defaultDest);

        route.stops.forEach(stopEntry => {
            const [id, name] = stopEntry.split('|');
            if (!id || !name) return;
            const optOrig = document.createElement('option'); optOrig.value = id; optOrig.textContent = name;
            const optDest = document.createElement('option'); optDest.value = id; optDest.textContent = name;
            originSelect.appendChild(optOrig);
            destSelect.appendChild(optDest);
        });

        if (segment.originId && route.stopOriginZone[segment.originId]) originSelect.value = segment.originId;
        else { segment.originId = null; originSelect.selectedIndex = 0; }
        if (segment.destId && route.stopDestZone[segment.destId]) destSelect.value = segment.destId;
        else { segment.destId = null; destSelect.selectedIndex = 0; }
        refreshSegmentUI(segmentId);
    }

    function renderSegments() {
        if (segments.length === 0) {
            segmentsContainer.innerHTML = `<div class="empty-message">✨ No segments yet. Click "Add another route segment" to start building your journey.</div>`;
            return;
        }
        segmentsContainer.innerHTML = '';
        segments.forEach(segment => {
            const segDiv = document.createElement('div');
            segDiv.className = 'segment-card';
            segDiv.id = `segment-${segment.id}`;
            segDiv.innerHTML = `
                <div class="segment-header">
                    <span class="segment-title">Segment ${segment.id}</span>
                    <button class="remove-seg" data-id="${segment.id}">✕</button>
                </div>
                <div class="form-row">
                    <div class="field">
                        <label>🚌 ROUTE</label>
                        <select class="route-select" data-id="${segment.id}">
                            ${Object.keys(ROUTES_DATA).map(rk => `<option value="${rk}" ${segment.routeKey === rk ? 'selected' : ''}>${ROUTES_DATA[rk].displayName}</option>`).join('')}
                        </select>
                    </div>
                    <div class="field">
                        <label>📍 ORIGIN</label>
                        <select class="origin-select" data-id="${segment.id}" id="origin-${segment.id}"></select>
                    </div>
                    <div class="field">
                        <label>🏁 DESTINATION</label>
                        <select class="dest-select" data-id="${segment.id}" id="dest-${segment.id}"></select>
                    </div>
                </div>
                <div class="segment-fare">
                    <span class="fare-label">🎫 Segment fare</span>
                    <span class="fare-amount segment-fare-amount">—</span>
                </div>
            `;
            segmentsContainer.appendChild(segDiv);
            if (segment.routeKey) populateStopDropdowns(segment.id, segment.routeKey);
            const routeSel = segDiv.querySelector('.route-select');
            const originSel = segDiv.querySelector('.origin-select');
            const destSel = segDiv.querySelector('.dest-select');
            const removeBtn = segDiv.querySelector('.remove-seg');
            routeSel.addEventListener('change', (e) => {
                segment.routeKey = e.target.value;
                segment.originId = null;
                segment.destId = null;
                populateStopDropdowns(segment.id, segment.routeKey);
                refreshSegmentUI(segment.id);
            });
            originSel.addEventListener('change', (e) => {
                segment.originId = e.target.value;
                refreshSegmentUI(segment.id);
            });
            destSel.addEventListener('change', (e) => {
                segment.destId = e.target.value;
                refreshSegmentUI(segment.id);
            });
            removeBtn.addEventListener('click', () => {
                segments = segments.filter(s => s.id !== segment.id);
                renderSegments();
                updateGrandTotal();
            });
        });
    }

    function addSegment() {
        const newId = ++segmentCounter;
        const firstRouteKey = Object.keys(ROUTES_DATA)[0];
        if (!firstRouteKey) return;
        segments.push({ id: newId, routeKey: firstRouteKey, originId: null, destId: null, fare: 0 });
        renderSegments();
        updateGrandTotal();
    }

    // --------------------------------------------------------------
    // Initialisation: load metadata → load all route data → start UI
    // --------------------------------------------------------------
    (async function init() {
        try {
            await loadRouteMetadata();
            await loadAllRouteData();
            addSegment();
            document.getElementById('addSegmentBtn').addEventListener('click', addSegment);
        } catch (err) {
            console.error("Fatal error during initialisation:", err);
            segmentsContainer.innerHTML = `<div class="empty-message">⚠️ Failed to load route data. Check console and ensure all files exist (route_metadata.json, stop .txt files, zone & price .json files).</div>`;
        }
    })();
</script>
</body>
</html>
